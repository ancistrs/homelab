# Homelab log rotation policy.
#
# Triggered daily at 01:15 by the `homelab.logrotate` LaunchAgent.
# State is tracked in `logrotate.state` (in this directory).
#
# Two patterns:
#
#   1. Always-on services (uvicorn-served): use `copytruncate`. The process
#      holds the file open continuously, so we cannot rename — we copy the
#      content to an archive then truncate the original in place. The process
#      keeps writing to the same inode (now empty).
#
#   2. Batch scripts (run on a schedule, exit when done): use `create`. They
#      open the log file fresh each run, so we can safely rename the old file
#      and create a new empty one.
#
# All entries: gzip-compress (delaycompress so the most-recent rotation stays
# uncompressed for grep), skip if missing, skip if empty, run as fink:staff.

# ── Always-on services ────────────────────────────────────────────────────────

/Users/fink/PAOS/code/homelab/scripts/kb-sync/kb-query-server.log {
    size 10M
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    su fink staff
}

/Users/fink/PAOS/code/homelab/whisper/whisper.log {
    size 10M
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    su fink staff
}

# Claude Code "Remote Control" session (always-on, KeepAlive). The log is the
# raw TUI captured through script(1)'s PTY — not human-useful, but bounded here
# so it can't grow without limit during heavy interactive use. copytruncate
# because launchd holds the file open for the lifetime of the agent.
/Users/fink/PAOS/code/homelab/scripts/claude-remote-paos.log {
    size 10M
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    su fink staff
}

# ── Batch scripts ─────────────────────────────────────────────────────────────

/Users/fink/PAOS/code/homelab/scripts/backup-homelab/backup-homelab.log {
    weekly
    rotate 8
    compress
    delaycompress
    missingok
    notifempty
    create 644 fink staff
    su fink staff
}

/Users/fink/PAOS/code/homelab/scripts/backup-personal/backup-personal.log {
    weekly
    rotate 8
    compress
    delaycompress
    missingok
    notifempty
    create 644 fink staff
    su fink staff
}

/Users/fink/PAOS/code/homelab/scripts/kb-sync/kb-sync.log {
    weekly
    rotate 8
    compress
    delaycompress
    missingok
    notifempty
    create 644 fink staff
    su fink staff
}
